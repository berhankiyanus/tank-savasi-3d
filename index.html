<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>TANK SAVAŞI 3D</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%;
               touch-action: none; overscroll-behavior: none;
               -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  #game { position: fixed; inset: 0; }
  .hud { position: fixed; font-family: "Courier New", monospace; color: #fff; z-index: 10;
         text-shadow: 0 2px 6px rgba(0,0,0,.8); user-select: none; pointer-events: none; }
  #topbar { top: 14px; left: 0; right: 0; display: flex; justify-content: space-between;
            padding: 0 22px; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
  #healthwrap { display: flex; gap: 5px; align-items: center; }
  .hp { width: 26px; height: 14px; background: #2aff5d; border: 1px solid rgba(0,0,0,.5);
        border-radius: 3px; box-shadow: 0 0 8px rgba(42,255,93,.6); }
  .hp.off { background: rgba(255,255,255,.15); box-shadow: none; }
  #msg { top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column;
         align-items: center; justify-content: center; text-align: center;
         background: rgba(0,0,0,.55); transition: opacity .4s; pointer-events: auto; }
  #msg h1 { font-size: 60px; margin: 0 0 10px; letter-spacing: 6px; color: #ffd76a;
            text-shadow: 0 0 30px rgba(255,160,40,.8), 0 4px 0 #7a4a00; }
  #msg h2 { font-size: 24px; margin: 6px 0; color: #fff; font-weight: normal; }
  #msg .keys { font-size: 16px; color: #b8e6ff; line-height: 1.9; margin-top: 10px; }
  .mbtn { font-family: "Courier New", monospace; font-weight: bold; letter-spacing: 2px;
          font-size: 20px; color: #fff; background: linear-gradient(180deg, #3f7d2f, #244d1a);
          border: 2px solid #7dff9b; border-radius: 10px; padding: 14px 30px; margin: 8px;
          cursor: pointer; text-shadow: 0 1px 3px rgba(0,0,0,.6);
          box-shadow: 0 4px 14px rgba(0,0,0,.5), 0 0 14px rgba(125,255,155,.25); }
  .mbtn:active { transform: scale(.95); }
  .mbtn.alt { background: linear-gradient(180deg, #8a4a1f, #5a2c0e); border-color: #ffd76a;
              box-shadow: 0 4px 14px rgba(0,0,0,.5), 0 0 14px rgba(255,215,106,.25); }
  .mbtn.small { font-size: 15px; padding: 8px 14px; margin: 4px; }
  .mbtn.on { outline: 3px solid #fff; }
  #menubtns { margin-top: 22px; display: flex; flex-wrap: wrap; justify-content: center; }
  #duelui { display: none; margin-top: 14px; align-items: center; flex-direction: column; }
  #duelui .or { color: #888; margin: 6px 0; }
  #joincode { font-family: "Courier New", monospace; font-size: 24px; font-weight: bold;
              width: 110px; text-align: center; letter-spacing: 6px; text-transform: uppercase;
              background: rgba(255,255,255,.1); color: #ffd76a; border: 2px solid #ffd76a;
              border-radius: 10px; padding: 12px 8px; outline: none; }
  #duelstatus { margin-top: 14px; font-size: 20px; color: #7dff9b; min-height: 28px; }
  #duelstatus .code { font-size: 34px; letter-spacing: 8px; color: #ffd76a; font-weight: bold; }
  #langsw { position: absolute; top: calc(18px + env(safe-area-inset-top)); right: 18px; }
  #errbox { bottom: 8px; left: 8px; right: 8px; background: rgba(160,20,20,.92); color: #fff;
            font-size: 13px; padding: 10px; border-radius: 8px; z-index: 99; display: none;
            word-break: break-all; }
  #msg .blink { margin-top: 10px; font-size: 15px; color: #7dff9b; animation: bl 1s steps(2) infinite; }
  @keyframes bl { 50% { opacity: 0; } }
  #flash { inset: 0; box-shadow: inset 0 0 120px 40px rgba(255,30,30,.9); opacity: 0; }
  #wavebanner { top: 26%; left: 0; right: 0; text-align: center; font-size: 42px; font-weight: bold;
                color: #ffd76a; letter-spacing: 5px; opacity: 0; text-shadow: 0 0 24px rgba(255,170,40,.9); }
  .hidden { opacity: 0 !important; pointer-events: none !important; }

  /* --- dokunmatik kontroller --- */
  #touchui { position: fixed; inset: 0; z-index: 20; display: none; pointer-events: none; }
  body.touch #touchui { display: block; }
  #stick { position: absolute; left: calc(22px + env(safe-area-inset-left)); bottom: calc(26px + env(safe-area-inset-bottom));
           width: 150px; height: 150px; border-radius: 50%;
           background: rgba(255,255,255,.07); border: 2px solid rgba(255,255,255,.28);
           pointer-events: auto; touch-action: none; backdrop-filter: blur(2px); }
  #knob { position: absolute; left: 50%; top: 50%; width: 64px; height: 64px; margin: -32px 0 0 -32px;
          border-radius: 50%; background: rgba(255,255,255,.38);
          box-shadow: 0 2px 12px rgba(0,0,0,.5); }
  #firebtn { position: absolute; right: calc(26px + env(safe-area-inset-right)); bottom: calc(40px + env(safe-area-inset-bottom));
             width: 106px; height: 106px; border-radius: 50%;
             background: radial-gradient(circle at 35% 30%, #ff8a5a, #c22a12);
             border: 3px solid rgba(255,255,255,.35);
             pointer-events: auto; touch-action: none;
             display: flex; align-items: center; justify-content: center;
             font-family: "Courier New", monospace; font-weight: bold; font-size: 19px; color: #fff;
             text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #firebtn:active { transform: scale(.92); }

  @media (max-width: 640px) {
    #msg h1 { font-size: 34px; letter-spacing: 3px; }
    #msg h2 { font-size: 16px; padding: 0 16px; }
    #msg .keys { font-size: 13px; }
    .mbtn { font-size: 17px; padding: 12px 20px; }
    #topbar { font-size: 14px; padding: 0 12px; top: calc(10px + env(safe-area-inset-top)); }
    .hp { width: 18px; height: 11px; }
    #wavebanner { font-size: 30px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="topbar" class="hud">
  <div id="healthwrap"><span id="hlabel">SAĞLIK</span>&nbsp;<span id="health"></span></div>
  <div id="wave">DALGA 1</div>
  <div id="score">SKOR 0</div>
</div>
<div id="wavebanner" class="hud"></div>
<div id="flash" class="hud"></div>

<div id="touchui">
  <div id="stick"><div id="knob"></div></div>
  <div id="firebtn">ATEŞ</div>
</div>

<div id="msg" class="hud">
  <div id="langsw">
    <button class="mbtn small" id="lang-tr">TR</button>
    <button class="mbtn small" id="lang-en">EN</button>
  </div>
  <h1 id="title">TANK SAVAŞI 3D</h1>
  <h2 id="submsg">Duvarların arkasına saklanan düşman tankları yok et!</h2>
  <div class="keys" id="keys"></div>
  <div id="menubtns">
    <button class="mbtn" id="btn-single">TEK OYUNCU</button>
    <button class="mbtn alt" id="btn-duel">ARKADAŞLA DÜELLO</button>
  </div>
  <div id="duelui">
    <button class="mbtn" id="btn-create">ODA KUR</button>
    <div class="or">— / —</div>
    <div id="joinrow">
      <input id="joincode" maxlength="4" placeholder="KOD" autocomplete="off">
      <button class="mbtn" id="btn-join">KATIL</button>
    </div>
    <div id="duelstatus"></div>
  </div>
</div>

<div id="errbox" class="hud"></div>

<script>
  window.addEventListener('error', function (e) { window.__showErr(e.message || 'Script error'); }, true);
  window.addEventListener('unhandledrejection', function (e) {
    window.__showErr((e.reason && e.reason.message) || String(e.reason) || 'Promise error');
  });
  window.__showErr = function (m) {
    var b = document.getElementById('errbox');
    b.style.display = 'block';
    b.textContent = 'HATA / ERROR: ' + m;
  };
  setTimeout(function () {
    if (!window.__gameLoaded) window.__showErr('Oyun yüklenemedi — tarayıcı çok eski olabilir / Game failed to load — browser may be too old.');
  }, 15000);
</script>
<script type="module" src="main.js"></script>
</body>
</html>
