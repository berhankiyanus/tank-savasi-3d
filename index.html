<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3f7d2f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>TANK SAVAŞI 3D</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #000; height: 100%;
               touch-action: none; overscroll-behavior: none;
               -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
  #game { position: fixed; inset: 0; }
  #loading { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column;
             align-items: center; justify-content: center; gap: 22px;
             background: radial-gradient(circle at 50% 40%, #1b2a14, #070a05); }
  #loading.gone { opacity: 0; pointer-events: none; transition: opacity .5s; }
  .ldtitle { font-family: "Courier New", monospace; font-weight: bold; letter-spacing: 5px; font-size: 34px;
             color: #ffd76a; text-shadow: 0 0 26px rgba(255,160,40,.7), 0 4px 0 #7a4a00; }
  .ldspin { width: 52px; height: 52px; border: 5px solid rgba(125,255,155,.25); border-top-color: #7dff9b;
            border-radius: 50%; animation: ldsp 0.9s linear infinite; }
  @keyframes ldsp { to { transform: rotate(360deg); } }
  .ldtext { font-family: "Courier New", monospace; color: #cfe6bf; letter-spacing: 2px; font-size: 15px; }
  .hud { position: fixed; font-family: "Courier New", monospace; color: #fff; z-index: 10;
         text-shadow: 0 2px 6px rgba(0,0,0,.8); user-select: none; pointer-events: none; }
  #topbar { top: 14px; left: 0; right: 0; display: flex; justify-content: space-between;
            padding: 0 22px; font-size: 20px; font-weight: bold; letter-spacing: 1px; }
  #healthwrap { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; max-width: 40%; }
  .hp { width: 24px; height: 14px; background: #2aff5d; border: 1px solid rgba(0,0,0,.5);
        border-radius: 3px; box-shadow: 0 0 8px rgba(42,255,93,.6); }
  .hp.off { background: rgba(255,255,255,.15); box-shadow: none; }
  #msg { top: 0; left: 0; right: 0; bottom: 0; display: flex; flex-direction: column;
         align-items: center; justify-content: center; text-align: center;
         background: rgba(0,0,0,.6); transition: opacity .4s; pointer-events: auto;
         overflow-y: auto; padding: 20px 0; box-sizing: border-box; }
  #msg h1 { font-size: 56px; margin: 0 0 6px; letter-spacing: 6px; color: #ffd76a;
            text-shadow: 0 0 30px rgba(255,160,40,.8), 0 4px 0 #7a4a00; }
  #msg h2 { font-size: 22px; margin: 4px 0; color: #fff; font-weight: normal; }
  #msg .keys { font-size: 15px; color: #b8e6ff; line-height: 1.8; margin-top: 8px; }
  .mbtn { font-family: "Courier New", monospace; font-weight: bold; letter-spacing: 2px;
          font-size: 19px; color: #fff; background: linear-gradient(180deg, #3f7d2f, #244d1a);
          border: 2px solid #7dff9b; border-radius: 10px; padding: 13px 26px; margin: 7px;
          cursor: pointer; text-shadow: 0 1px 3px rgba(0,0,0,.6);
          box-shadow: 0 4px 14px rgba(0,0,0,.5), 0 0 14px rgba(125,255,155,.25); }
  .mbtn:active { transform: scale(.95); }
  .mbtn.alt { background: linear-gradient(180deg, #8a4a1f, #5a2c0e); border-color: #ffd76a;
              box-shadow: 0 4px 14px rgba(0,0,0,.5), 0 0 14px rgba(255,215,106,.25); }
  .mbtn.gold { background: linear-gradient(180deg, #b8892a, #6e4e11); border-color: #ffdd55; }
  .mbtn.play { display: block; width: min(92%, 420px); margin: 8px auto 14px; font-size: 26px;
               padding: 20px 26px; letter-spacing: 3px;
               background: linear-gradient(180deg, #ffb733, #e8631a); border-color: #ffe08a; color: #2a1600;
               text-shadow: 0 1px 2px rgba(255,255,255,.35);
               box-shadow: 0 6px 22px rgba(0,0,0,.55), 0 0 26px rgba(255,170,60,.5);
               animation: playpulse 1.8s ease-in-out infinite; }
  @keyframes playpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.035); } }
  .mbtn.play:active { transform: scale(.96); animation: none; }
  .mbtn.small { font-size: 14px; padding: 8px 14px; margin: 4px; }
  .mbtn.on { outline: 3px solid #fff; }
  .mbtn:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.6); }
  #menubtns { margin-top: 18px; display: flex; flex-wrap: wrap; justify-content: center; }
  .panel { display: none; flex-direction: column; align-items: center; width: 100%;
           max-width: 760px; }
  .panel.show { display: flex; }
  #duelui .or { color: #888; margin: 6px 0; }
  #joincode { font-family: "Courier New", monospace; font-size: 24px; font-weight: bold;
              width: 110px; text-align: center; letter-spacing: 6px; text-transform: uppercase;
              background: rgba(255,255,255,.1); color: #ffd76a; border: 2px solid #ffd76a;
              border-radius: 10px; padding: 12px 8px; outline: none; }
  #duelstatus { margin-top: 14px; font-size: 20px; color: #7dff9b; min-height: 28px; }
  #rematchstatus { margin-top: 14px; font-size: 19px; color: #7dff9b; min-height: 26px; }
  #coopstatus { margin-top: 12px; font-size: 18px; color: #7dff9b; min-height: 26px; line-height: 1.5; }
  #coopstatus .code { font-size: 30px; letter-spacing: 7px; color: #ffd76a; font-weight: bold; }
  #statsline { margin-top: 16px; font-size: 16px; color: #cfe6bf; letter-spacing: 1px; cursor: pointer; pointer-events: auto; }
  #statsline:active { transform: scale(.96); }
  #garagetabs { display: flex; gap: 8px; margin-bottom: 4px; }
  #achlist { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 460px; margin: 10px 0; }
  .achrow { background: rgba(30,40,22,.7); border: 1px solid #4a6b3a; border-radius: 10px; padding: 8px 12px; text-align: left; }
  .achrow.done { border-color: #ffd76a; }
  .achtop { font-size: 16px; font-weight: bold; color: #fff; display: flex; justify-content: space-between; }
  .achr { color: #ffdd55; }
  .achdesc { font-size: 12px; color: #b8e6ff; margin: 2px 0 5px; }
  .abar { height: 8px; background: rgba(255,255,255,.15); border-radius: 4px; overflow: hidden; }
  .abar > i { display: block; height: 100%; background: #7dff9b; border-radius: 4px; }
  #toast { top: 92px; left: 0; right: 0; text-align: center; font-family: "Courier New", monospace; font-weight: bold;
           font-size: 19px; color: #ffe08a; opacity: 0; transition: opacity .4s; z-index: 45;
           text-shadow: 0 2px 8px rgba(0,0,0,.9); }
  .gear { font-size: 19px; background: rgba(0,0,0,.35); border: 2px solid rgba(255,255,255,.4);
          color: #fff; border-radius: 8px; width: 40px; height: 34px; cursor: pointer; pointer-events: auto; }
  .gear:active { transform: scale(.92); }
  #settings { top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center;
              background: rgba(0,0,0,.72); z-index: 40; pointer-events: auto; }
  .setbox { display: flex; flex-direction: column; align-items: center; gap: 7px;
            background: linear-gradient(180deg, rgba(30,40,22,.96), rgba(16,22,12,.98));
            border: 2px solid #7dff9b; border-radius: 14px; padding: 22px 34px; min-width: 240px; }
  .setbox h2 { color: #ffd76a; margin: 0 0 8px; letter-spacing: 3px; }
  #duelstatus .code { font-size: 34px; letter-spacing: 8px; color: #ffd76a; font-weight: bold; }
  #langsw { position: absolute; top: calc(16px + env(safe-area-inset-top)); right: 18px; }
  #coinbar { position: absolute; top: calc(16px + env(safe-area-inset-top)); left: 18px;
             font-size: 22px; font-weight: bold; color: #ffdd55; letter-spacing: 1px;
             display: flex; align-items: center; gap: 14px; }
  #levelwrap { display: flex; align-items: center; gap: 7px; }
  #lvlnum { font-size: 15px; color: #7dff9b; letter-spacing: 0; min-width: 40px; }
  #lvlbar { width: 92px; height: 9px; background: rgba(255,255,255,.15); border-radius: 5px;
            overflow: hidden; border: 1px solid rgba(125,255,155,.4); }
  #lvlfill { height: 100%; width: 2%; background: linear-gradient(90deg, #3f7d2f, #7dff9b);
             border-radius: 5px; transition: width .6s ease; }
  #res-title { font-size: 40px; font-weight: bold; letter-spacing: 2px; color: #7dff9b;
               text-shadow: 0 2px 10px rgba(0,0,0,.6); margin-bottom: 4px; }
  #res-sub { font-size: 17px; color: #d8d8d8; margin-bottom: 20px; min-height: 22px; }
  #res-xprow { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 6px auto 4px;
               width: min(90%, 380px); }
  #res-lvl { font-size: 17px; color: #7dff9b; font-weight: bold; min-width: 52px; }
  #res-xpbar { flex: 1; height: 16px; background: rgba(255,255,255,.14); border-radius: 8px;
               overflow: hidden; border: 1px solid rgba(125,255,155,.45); }
  #res-xpfill { height: 100%; width: 0%; background: linear-gradient(90deg, #3f7d2f, #7dff9b); border-radius: 8px; }
  #res-rewards { font-size: 20px; font-weight: bold; color: #ffdd55; margin: 14px 0 22px; letter-spacing: 1px; }
  #questlist { display: flex; flex-direction: column; gap: 12px; width: min(92%, 440px); margin: 10px auto 18px; }
  .qrow { background: rgba(0,0,0,.32); border: 1px solid rgba(125,255,155,.3); border-radius: 10px; padding: 11px 14px; text-align: left; }
  .qrow.done { border-color: #7dff9b; background: rgba(60,125,47,.28); }
  .qtext { font-size: 16px; color: #fff; margin-bottom: 7px; display: flex; justify-content: space-between; gap: 8px; }
  .qrew { color: #ffdd55; font-weight: bold; }
  .qbar { height: 10px; background: rgba(255,255,255,.14); border-radius: 5px; overflow: hidden; }
  .qfill { height: 100%; background: linear-gradient(90deg, #3f7d2f, #7dff9b); border-radius: 5px; }
  .qprog { font-size: 12px; color: #bdbdbd; text-align: right; margin-top: 4px; }
  #lbtabs { display: flex; gap: 8px; justify-content: center; margin: 8px 0 12px; }
  #lblist { display: flex; flex-direction: column; gap: 5px; width: min(92%, 420px); margin: 0 auto 16px;
            max-height: 52vh; overflow-y: auto; }
  .lbrow { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,.3); border-radius: 8px;
           padding: 9px 14px; font-size: 16px; color: #fff; }
  .lbrow.me { background: rgba(60,125,47,.4); border: 1px solid #7dff9b; }
  .lbrank { min-width: 34px; font-weight: bold; color: #ffdd55; }
  .lbname { flex: 1; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lbscore { color: #7dff9b; font-weight: bold; }
  .lbempty { color: #cfcfcf; font-size: 16px; margin: 20px; }
  #tokenbar { color: #ff9de0; }
  #tokenmachine { margin: 8px auto 2px; }
  .tm-box { display: inline-flex; flex-direction: column; align-items: center; gap: 6px;
            background: rgba(0,0,0,.35); border: 2px solid #ff9de0; border-radius: 12px; padding: 12px 22px; }
  .tm-title { font-size: 18px; font-weight: bold; color: #ff9de0; letter-spacing: 1px; }
  .tm-count { font-size: 15px; color: #fff; }
  .tm-count b { color: #ff9de0; }
  .tm-odds { font-size: 12px; color: #b8b8b8; }
  #buildchoice { inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
                 background: rgba(6,10,4,.82); z-index: 40; gap: 22px; pointer-events: auto; }
  #build-title { font-size: 30px; font-weight: bold; color: #ffdd55; letter-spacing: 2px; text-shadow: 0 2px 8px #000; }
  #build-cards { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; padding: 0 14px; }
  .buildcard { width: 150px; min-height: 168px; background: linear-gradient(180deg, #2a3d1c, #16220e);
               border: 2px solid #7dff9b; border-radius: 14px; padding: 18px 12px; cursor: pointer; color: #fff;
               display: flex; flex-direction: column; align-items: center; gap: 10px; transition: transform .12s; }
  .buildcard:hover, .buildcard:active { transform: scale(1.05); border-color: #ffdd55; }
  .bc-ic { font-size: 46px; }
  .bc-nm { font-size: 18px; font-weight: bold; letter-spacing: 1px; }
  .bc-ds { font-size: 13px; color: #cfe8cf; }
  #errbox { bottom: 8px; left: 8px; right: 8px; background: rgba(160,20,20,.92); color: #fff;
            font-size: 13px; padding: 10px; border-radius: 8px; z-index: 99; display: none;
            word-break: break-all; }
  #flash { inset: 0; box-shadow: inset 0 0 120px 40px rgba(255,30,30,.9); opacity: 0; }
  #wavebanner { top: 26%; left: 0; right: 0; text-align: center; font-size: 42px; font-weight: bold;
                color: #ffd76a; letter-spacing: 5px; opacity: 0; text-shadow: 0 0 24px rgba(255,170,40,.9); }
  #namerow { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; font-size: 18px; color: #cfe6bf; }
  #playername { font-family: "Courier New", monospace; font-weight: bold; font-size: 17px; width: 150px; text-align: center;
                background: rgba(255,255,255,.1); color: #ffd76a; border: 2px solid #7dff9b; border-radius: 8px; padding: 6px 8px; outline: none; }
  #coophud { top: 78px; left: 22px; display: none; font-size: 14px; line-height: 1.5; }
  #coophud .crow { color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.9); }
  #ftuehint { display: none; bottom: 15%; left: 0; right: 0; text-align: center; font-size: 17px; font-weight: bold;
              letter-spacing: 1px; color: #fff; text-shadow: 0 2px 6px #000; transition: opacity .5s;
              pointer-events: none; padding: 0 14px; }
  #killfeed { top: 182px; right: 12px; display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
  .kfrow { font-size: 14px; color: #fff; background: rgba(0,0,0,.5); border-radius: 6px; padding: 3px 8px;
           transition: opacity .5s; text-shadow: 0 1px 2px #000; }
  .kfrow b { color: #ffd76a; }
  #buffs { top: 50px; left: 22px; display: flex; gap: 6px; }
  .buff { font-family: "Courier New", monospace; font-weight: bold; font-size: 15px; color: #fff;
          background: rgba(20,30,15,.7); border: 1px solid #7dff9b; border-radius: 7px; padding: 3px 8px;
          box-shadow: 0 0 8px rgba(125,255,155,.35); }
  #minimap { top: 52px; right: 10px; width: 118px; height: 118px; border-radius: 8px;
             border: 2px solid rgba(255,255,255,.35); background: rgba(0,0,0,.25); display: none; }
  #bossbar { top: 58px; left: 0; right: 0; display: none; flex-direction: column; align-items: center; }
  #bosslabel { color: #ff5a5a; font-weight: bold; letter-spacing: 4px; font-size: 15px; text-shadow: 0 0 10px rgba(255,40,40,.8); }
  #bosshpwrap { width: 60%; max-width: 420px; height: 14px; margin-top: 3px; background: rgba(0,0,0,.5);
                border: 2px solid #ff5a5a; border-radius: 8px; overflow: hidden; }
  #bosshp { height: 100%; width: 100%; background: linear-gradient(90deg, #ff2a2a, #ff7a3a);
            box-shadow: 0 0 10px rgba(255,50,30,.7); transition: width .12s; }
  .hidden { opacity: 0 !important; pointer-events: none !important; }

  /* kartlar (garaj + harita) */
  #cardwrap { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 12px 8px; }
  .card { width: 210px; background: linear-gradient(180deg, rgba(40,50,30,.9), rgba(20,28,16,.92));
          border: 2px solid #4a6b3a; border-radius: 12px; padding: 12px; text-align: center; }
  .card.sel { border-color: #ffd76a; box-shadow: 0 0 18px rgba(255,215,106,.4); }
  .card.locked { opacity: .55; filter: grayscale(.5); }
  .card .cname { font-size: 19px; font-weight: bold; letter-spacing: 1px; }
  .card .cswatch { width: 100%; height: 46px; border-radius: 8px; margin: 8px 0;
                   border: 1px solid rgba(0,0,0,.4); }
  .card .cstat { font-size: 12px; color: #cfe6bf; text-align: left; margin: 3px 0; line-height: 1.5; }
  .bar { display: inline-block; height: 8px; background: #7dff9b; border-radius: 4px;
         vertical-align: middle; margin-left: 5px; }
  .bar.bg { background: rgba(255,255,255,.15); width: 70px; position: relative; }
  .bar.bg > i { position: absolute; left: 0; top: 0; bottom: 0; background: #7dff9b; border-radius: 4px; }
  .card .cprice { font-size: 16px; font-weight: bold; color: #ffdd55; margin: 6px 0; }

  #msg .blink { margin-top: 10px; font-size: 15px; color: #7dff9b; }

  #touchui { position: fixed; inset: 0; z-index: 20; display: none; pointer-events: none; }
  body.touch #touchui { display: block; }
  #stick { position: absolute; left: calc(22px + env(safe-area-inset-left)); bottom: calc(26px + env(safe-area-inset-bottom));
           width: 150px; height: 150px; border-radius: 50%;
           background: rgba(255,255,255,.07); border: 2px solid rgba(255,255,255,.28);
           pointer-events: auto; touch-action: none; backdrop-filter: blur(2px); }
  #knob { position: absolute; left: 50%; top: 50%; width: 64px; height: 64px; margin: -32px 0 0 -32px;
          border-radius: 50%; background: rgba(255,255,255,.38);
          box-shadow: 0 2px 12px rgba(0,0,0,.5); }
  #firebtn { position: absolute; right: calc(26px + env(safe-area-inset-right)); bottom: calc(40px + env(safe-area-inset-bottom));
             width: 106px; height: 106px; border-radius: 50%;
             background: radial-gradient(circle at 35% 30%, #ff8a5a, #c22a12);
             border: 3px solid rgba(255,255,255,.35);
             pointer-events: auto; touch-action: none;
             display: flex; align-items: center; justify-content: center;
             font-family: "Courier New", monospace; font-weight: bold; font-size: 19px; color: #fff;
             text-shadow: 0 1px 3px rgba(0,0,0,.6); }
  #firebtn:active { transform: scale(.92); }

  @media (max-width: 640px) {
    #msg h1 { font-size: 30px; letter-spacing: 3px; }
    #msg h2 { font-size: 15px; padding: 0 14px; }
    #msg .keys { font-size: 12px; }
    .mbtn { font-size: 16px; padding: 11px 18px; }
    #topbar { font-size: 13px; padding: 0 12px; top: calc(10px + env(safe-area-inset-top)); }
    .hp { width: 15px; height: 10px; }
    #wavebanner { font-size: 28px; }
    .card { width: 150px; }
    #coinbar, #langsw { font-size: 16px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="loading">
  <div class="ldtitle">TANK SAVAŞI 3D</div>
  <div class="ldspin"></div>
  <div class="ldtext">Yükleniyor...</div>
</div>

<div id="topbar" class="hud">
  <div id="healthwrap"><span id="hlabel">SAĞLIK</span>&nbsp;<span id="health"></span></div>
  <div id="wave">DALGA 1</div>
  <div style="display:flex;align-items:center;gap:12px;pointer-events:auto">
    <span id="score">SKOR 0</span>
    <button class="gear" id="btn-settings">⚙</button>
  </div>
</div>
<div id="buffs" class="hud"></div>
<div id="coophud" class="hud"></div>
<div id="killfeed" class="hud"></div>
<div id="ftuehint" class="hud"></div>
<canvas id="minimap" class="hud" width="118" height="118"></canvas>
<div id="wavebanner" class="hud"></div>
<div id="bossbar" class="hud">
  <div id="bosslabel">BOSS</div>
  <div id="bosshpwrap"><div id="bosshp"></div></div>
</div>
<div id="flash" class="hud"></div>
<div id="buildchoice" class="hud hidden">
  <div id="build-title">YÜKSELTME SEÇ</div>
  <div id="build-cards"></div>
</div>

<div id="touchui">
  <div id="stick"><div id="knob"></div></div>
  <div id="firebtn">ATEŞ</div>
</div>

<div id="msg" class="hud">
  <div id="coinbar">
    <div id="levelwrap"><span id="lvlnum">Sv 1</span><div id="lvlbar"><div id="lvlfill"></div></div></div>
    🪙 <span id="coins">0</span>
    <span id="tokenbar">🎰 <span id="tokens">0</span></span>
  </div>
  <div id="langsw">
    <button class="mbtn small" id="lang-tr">TR</button>
    <button class="mbtn small" id="lang-en">EN</button>
    <button class="mbtn small" id="btn-settings-menu">⚙</button>
  </div>
  <h1 id="title">TANK SAVAŞI 3D</h1>
  <h2 id="submsg">Duvarların arkasına saklanan düşman tankları yok et!</h2>
  <div class="keys" id="keys"></div>

  <!-- ana menü -->
  <div id="panel-main" class="panel show">
    <div id="namerow">🎖 <input id="playername" maxlength="12" placeholder="İsmin" autocomplete="off"></div>
    <div id="menubtns">
      <button class="mbtn play" id="btn-quickplay">⚡ HIZLI OYNA</button>
      <button class="mbtn" id="btn-single">TEK OYUNCU</button>
      <button class="mbtn alt" id="btn-duel">ARKADAŞLA DÜELLO</button>
      <button class="mbtn alt" id="btn-ball">1v1 TOP MAÇI</button>
      <button class="mbtn alt" id="btn-coop">KOOPERATİF</button>
      <button class="mbtn alt" id="btn-team">2v2 TAKIM</button>
      <button class="mbtn gold" id="btn-quests">🎯 GÖREVLER</button>
      <button class="mbtn gold" id="btn-lb">🏆 LİDER</button>
      <button class="mbtn gold" id="btn-garage">GARAJ</button>
    </div>
    <div id="statsline"></div>
  </div>

  <!-- harita seçimi -->
  <div id="panel-maps" class="panel">
    <div id="cardwrap-maps" class="card-list"></div>
    <button class="mbtn small" id="btn-back-maps">‹ GERİ</button>
  </div>

  <!-- garaj -->
  <div id="panel-garage" class="panel">
    <div id="garagetabs">
      <button class="mbtn small on" id="gt-tanks">TANKLAR</button>
      <button class="mbtn small" id="gt-skins">KAPLAMALAR</button>
    </div>
    <div id="tokenmachine"></div>
    <div id="cardwrap-garage" class="card-list"></div>
    <button class="mbtn small" id="btn-back-garage">‹ GERİ</button>
  </div>

  <!-- profil & başarımlar -->
  <div id="panel-profile" class="panel">
    <div id="achlist"></div>
    <button class="mbtn small" id="btn-back-profile">‹ GERİ</button>
  </div>

  <!-- düello -->
  <div id="panel-duel" class="panel">
    <div id="duelmapsrow"></div>
    <button class="mbtn" id="btn-create">ODA KUR</button>
    <div class="or">— / —</div>
    <div id="joinrow">
      <input id="joincode" maxlength="4" placeholder="KOD" autocomplete="off">
      <button class="mbtn" id="btn-join">KATIL</button>
    </div>
    <div id="duelstatus"></div>
    <button class="mbtn small" id="btn-duel-share" style="display:none">🔗 DAVET LİNKİ</button>
    <button class="mbtn small" id="btn-back-duel">‹ GERİ</button>
  </div>

  <!-- kooperatif (2-4 kişi, lobi) -->
  <div id="panel-coop" class="panel">
    <div id="coopmapsrow"></div>
    <button class="mbtn" id="btn-coop-create">ODA KUR</button>
    <div class="or">— / —</div>
    <div id="coopjoinrow">
      <input id="coopcode" maxlength="4" placeholder="KOD" autocomplete="off">
      <button class="mbtn" id="btn-coop-join">KATIL</button>
    </div>
    <div id="coopstatus"></div>
    <button class="mbtn" id="btn-coop-share" style="display:none">🔗 DAVET LİNKİ</button>
    <button class="mbtn gold" id="btn-coop-start" style="display:none">BAŞLAT</button>
    <button class="mbtn small" id="btn-back-coop">‹ GERİ</button>
  </div>

  <!-- tekrar oyna (maç sonu, aynı oda) -->
  <div id="panel-rematch" class="panel">
    <div id="menubtns">
      <button class="mbtn" id="btn-rematch">TEKRAR OYNA</button>
      <button class="mbtn alt" id="btn-leave">ÇIKIŞ</button>
    </div>
    <div id="rematchstatus"></div>
  </div>

  <!-- lider tablosu -->
  <div id="panel-lb" class="panel">
    <div id="lbtabs">
      <button class="mbtn small on" id="lbt-day">BUGÜN</button>
      <button class="mbtn small" id="lbt-week">BU HAFTA</button>
    </div>
    <div id="lblist"></div>
    <button class="mbtn small" id="btn-back-lb">‹ GERİ</button>
  </div>

  <!-- günlük görevler -->
  <div id="panel-quests" class="panel">
    <div id="questlist"></div>
    <button class="mbtn small" id="btn-back-quests">‹ GERİ</button>
  </div>

  <!-- maç sonu "hasat" ekranı (XP/ödül + tek tuş tekrar) -->
  <div id="panel-result" class="panel">
    <div id="res-title">KAZANDIN!</div>
    <div id="res-sub"></div>
    <div id="res-xprow">
      <span id="res-lvl">Sv 1</span>
      <div id="res-xpbar"><div id="res-xpfill"></div></div>
    </div>
    <div id="res-rewards"></div>
    <button class="mbtn play" id="res-again">↻ TEKRAR OYNA</button>
    <button class="mbtn small" id="res-menu">‹ ANA MENÜ</button>
  </div>
</div>

<div id="toast" class="hud"></div>

<div id="settings" class="hud hidden">
  <div class="setbox">
    <h2 id="set-title">AYARLAR</h2>
    <button class="mbtn" id="set-sound">Ses: AÇIK</button>
    <button class="mbtn" id="set-music">Müzik: AÇIK</button>
    <button class="mbtn" id="set-quality">Kalite: YÜKSEK</button>
    <div id="set-ingame" style="display:none;flex-direction:column;align-items:center">
      <button class="mbtn" id="set-resume">DEVAM ET</button>
      <button class="mbtn alt" id="set-quit">ANA MENÜ</button>
    </div>
    <button class="mbtn small" id="set-close">KAPAT</button>
  </div>
</div>

<div id="errbox" class="hud"></div>

<script>
  window.addEventListener('error', function (e) { window.__showErr(e.message || 'Script error'); }, true);
  window.addEventListener('unhandledrejection', function (e) {
    window.__showErr((e.reason && e.reason.message) || String(e.reason) || 'Promise error');
  });
  window.__showErr = function (m) {
    var b = document.getElementById('errbox');
    b.style.display = 'block';
    b.textContent = 'HATA / ERROR: ' + m;
  };
  setTimeout(function () {
    if (!window.__gameLoaded) window.__showErr('Oyun yüklenemedi — tarayıcı çok eski olabilir / Game failed to load.');
  }, 15000);
  // service worker sadece web'de (native app'te varlıklar zaten cihazda gömülü — SW gereksiz/sorunlu)
  var __native = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
  if ('serviceWorker' in navigator && !__native) {
    window.addEventListener('load', function () { navigator.serviceWorker.register('sw.js').catch(function () {}); });
  }
</script>
<script type="module" src="main.js"></script>
</body>
</html>
